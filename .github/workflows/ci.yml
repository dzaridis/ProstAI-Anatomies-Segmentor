name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (when fired manually)"
        type: choice
        required: false
        default: patch
        options: [patch, minor, major]
      skip_inference:
        description: "Skip the long CPU inference job (only build + import smoke)"
        type: boolean
        required: false
        default: false

env:
  HARBOR_REGISTRY: harbor.eucaim.cancerimage.eu
  HARBOR_PROJECT: processing-tools
  HARBOR_IMAGE_NAME: Prostate-Anatomies-MRI-Segmentation

permissions:
  contents: write    # needed for auto-tagging and releases

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1 — Build the image and run the FAST smoke tests only.
  # ~10 min on a warm cache. Required for every push and PR.
  # All downstream jobs (inference, bump-tag, harbor-push, release)
  # depend on this one.
  # ────────────────────────────────────────────────────────────────────
  build-and-smoke:
    name: Build & smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (LFS pointers only)
        uses: actions/checkout@v4

      - name: Build LFS pointer manifest (for cache key)
        run: |
          git lfs ls-files --long | sort > .lfs-manifest
          echo "--- LFS files tracked: ---"
          cat .lfs-manifest

      - name: Restore LFS object cache
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-manifest') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Pull missing LFS objects
        run: |
          git lfs pull
          find nnUnet_paths -name "*.pth" -exec ls -lh {} \;

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with GHA cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: prostate-zone-segmentor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — CLI help
        run: docker run --rm prostate-zone-segmentor:ci --help

      - name: Smoke test — heavy imports
        run: |
          docker run --rm --entrypoint python prostate-zone-segmentor:ci -c \
            "from nnunetv2.inference.predict_from_raw_data import nnUNetPredictor; \
             import skimage.transform, pandas, SimpleITK, torch, blosc2, six, packaging; \
             print('imports ok')"

  # ────────────────────────────────────────────────────────────────────
  # Job 2 — CPU inference validation on the NIfTI sample.
  # Runs in PARALLEL with bump-tag/harbor-push/release on main pushes.
  # Slow (~30–60 min) but does not block the release pipeline.
  # Skipped on PRs and when workflow_dispatch input skip_inference=true.
  # ────────────────────────────────────────────────────────────────────
  inference-validate:
    name: CPU inference validation
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: |
      github.event_name != 'pull_request' &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_inference)
    timeout-minutes: 90

    steps:
      - name: Checkout (LFS pointers only)
        uses: actions/checkout@v4

      - name: Build LFS pointer manifest (for cache key)
        run: git lfs ls-files --long | sort > .lfs-manifest

      - name: Restore LFS object cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-manifest') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Pull missing LFS objects
        run: git lfs pull

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          docker image prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cache hit from build-and-smoke)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: prostate-zone-segmentor:ci
          cache-from: type=gha

      - name: Inference test — NIfTI sample (CPU)
        timeout-minutes: 75
        run: |
          mkdir -p ci_input ci_output
          cp examples/nifti/*.nii.gz ci_input/
          chmod -R 0777 ci_input ci_output
          docker run --rm \
            -v "${PWD}/ci_input:/input:ro" \
            -v "${PWD}/ci_output:/output" \
            prostate-zone-segmentor:ci \
              --input /input --output /output \
              --input-format nifti --device cpu --log-level INFO

      - name: Restore output ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" ci_output || true

      - name: Validate outputs
        run: |
          set -e
          test -f ci_output/results.json
          echo "--- results.json ---"
          cat ci_output/results.json
          python - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path("ci_output/results.json").read_text())
          assert data["cases"], "no cases recorded"
          for c in data["cases"]:
              assert c["status"] == "ok", f"case {c['case_id']} failed: {c.get('error')}"
              for mask in ("wg_binary", "pz_binary", "tz_binary"):
                  assert mask in c["outputs"], f"missing {mask} for {c['case_id']}"
                  assert (pathlib.Path("ci_output") / c["outputs"][mask]).is_file()
          print(f"OK — {len(data['cases'])} case(s) validated.")
          PY

      - name: Upload outputs as artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-segmentations
          path: ci_output/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Job 3 — Auto-bump the version and push a git tag.
  # Runs only on push to main (after smoke tests pass) or workflow_dispatch.
  # NOT blocked by the slow inference job.
  # ────────────────────────────────────────────────────────────────────
  bump-tag:
    name: Auto-bump version & tag
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    outputs:
      new_tag:     ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog:   ${{ steps.tag.outputs.changelog }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version & push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump || 'patch' }}
          release_branches: main
          tag_prefix: v

  # ────────────────────────────────────────────────────────────────────
  # Job 4 — Build & push the image to the EUCAIM Harbor registry.
  # Required secrets: HARBOR_USERNAME, HARBOR_PASSWORD
  # ────────────────────────────────────────────────────────────────────
  harbor-push:
    name: Push image to EUCAIM Harbor
    runs-on: ubuntu-latest
    needs: bump-tag
    timeout-minutes: 45

    steps:
      - name: Checkout at the new tag (LFS pointers only)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-tag.outputs.new_tag }}

      - name: Build LFS pointer manifest (for cache key)
        run: git lfs ls-files --long | sort > .lfs-manifest

      - name: Restore LFS object cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-manifest') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Pull missing LFS objects
        run: git lfs pull

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY"
          docker image prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to EUCAIM Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.bump-tag.outputs.new_version }}
            type=raw,value=${{ needs.bump-tag.outputs.new_tag }}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.bump-tag.outputs.new_version }}
            org.opencontainers.image.licenses=EUPL-1.2

      - name: Build & push to Harbor
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed references
        run: |
          echo "Pushed image tags:"
          echo "${{ steps.meta.outputs.tags }}"

  # ────────────────────────────────────────────────────────────────────
  # Job 5 — Create a GitHub Release for the new tag.
  # ────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [bump-tag, harbor-push]

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-tag.outputs.new_tag }}
          name: "ProstAI Anatomies Segmentor ${{ needs.bump-tag.outputs.new_tag }}"
          generate_release_notes: true
          body: |
            ## ProstAI Anatomies Segmentor — `${{ needs.bump-tag.outputs.new_tag }}`

            Container image published to the EUCAIM Harbor registry:

            ```
            docker pull ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE_NAME }}:${{ needs.bump-tag.outputs.new_version }}
            docker pull ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.HARBOR_IMAGE_NAME }}:latest
            ```

            ### Changelog (auto-generated)

            ${{ needs.bump-tag.outputs.changelog }}

            ---

            See the [README](https://github.com/${{ github.repository }}/blob/${{ needs.bump-tag.outputs.new_tag }}/README.md) for usage and the [`examples/`](https://github.com/${{ github.repository }}/tree/${{ needs.bump-tag.outputs.new_tag }}/examples) folder for sample inputs.
