name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (when fired manually)"
        type: choice
        required: false
        default: patch
        options: [patch, minor, major]

permissions:
  contents: write    # needed for auto-tagging and creating releases

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Auto-bump the version, push a git tag and create a GitHub Release.
  # Runs on every push to main (and on manual dispatch). No Docker work.
  # ────────────────────────────────────────────────────────────────────
  tag-and-release:
    name: Auto-tag & GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version & push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump || 'patch' }}
          release_branches: main
          tag_prefix: v

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "ProstAI Anatomies & Lesion Segmentor ${{ steps.tag.outputs.new_tag }}"
          generate_release_notes: true
          body: |
            ## ProstAI Anatomies & Lesion Segmentor — `${{ steps.tag.outputs.new_tag }}`

            ### Changelog (auto-generated)

            ${{ steps.tag.outputs.changelog }}

            ---

            See the [README](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.new_tag }}/README.md) for usage and the [`examples/`](https://github.com/${{ github.repository }}/tree/${{ steps.tag.outputs.new_tag }}/examples) folder for sample inputs.
