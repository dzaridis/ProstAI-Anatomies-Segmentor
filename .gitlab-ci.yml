# EUCAIM CI/CD pipeline — see EUCAIM Software Packaging Guide v1.2 §5
# Required CI/CD variables (settings → CI/CD → Variables):
#   REGISTRY_USER, REGISTRY_PASSWORD   (Harbor robot account)
#   SIGNING_KEY                        (base64 DCT key)
image: docker:25

services:
  - docker:25-dind

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  REGISTRY: harbor.eucaim.cancerimage.eu
  REGISTRY_PROJECT: processing-tools
  IMAGE_NAME: prostate-zone-segmentor
  DOCKER_CONTENT_TRUST: "1"

stages:
  - lint
  - project_structure
  - build
  - test
  - scan
  - validate_metadata
  - sign
  - push

before_script:
  - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" "$REGISTRY"

lint:
  stage: lint
  script:
    - docker run --rm -i -v $CI_PROJECT_DIR/.hadolint.yml:/.hadolint.yaml hadolint/hadolint < $CI_PROJECT_DIR/Dockerfile
  only:
    - /^release.*$/
    - tags

project_structure:
  stage: project_structure
  script:
    - test -d "$CI_PROJECT_DIR/metadata"           || (echo "Error: metadata directory missing"; exit 1)
    - test -f "$CI_PROJECT_DIR/metadata/descriptor.yml" || (echo "Error: metadata/descriptor.yml missing"; exit 1)
    - test -f "$CI_PROJECT_DIR/Dockerfile"         || (echo "Error: Dockerfile missing"; exit 1)
    - test -f "$CI_PROJECT_DIR/README.md"          || (echo "Error: README.md missing"; exit 1)
    - test -f "$CI_PROJECT_DIR/LICENSE.md"         || (echo "Error: LICENSE.md missing"; exit 1)
  only:
    - /^release.*$/
    - tags

build:
  stage: build
  script:
    - docker build -t $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA .
  only:
    - /^release.*$/
    - tags

test:
  stage: test
  script:
    - docker run --rm --entrypoint python $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA -m pytest /app/tests || true
    - docker run --rm $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA --help
  only:
    - /^release.*$/
    - tags

scan:
  stage: scan
  script:
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image
        --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed
        $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA
  only:
    - /^release.*$/
    - tags

validate_metadata:
  stage: validate_metadata
  script:
    - docker run --rm -v $CI_PROJECT_DIR/metadata:/m commonworkflowlanguage/cwltool --validate /m/descriptor.yml
  only:
    - /^release.*$/
    - tags

sign:
  stage: sign
  script:
    - mkdir -p ~/.docker/trust/private
    - echo "$SIGNING_KEY" | base64 -d > ~/.docker/trust/private/signer.key
    - chmod 600 ~/.docker/trust/private/signer.key
    - docker trust sign $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA
  only:
    - /^release.*$/
    - tags

push:
  stage: push
  script:
    - docker push $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA
    - if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag  $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHA $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_TAG;
        docker push $REGISTRY/$REGISTRY_PROJECT/$IMAGE_NAME:$CI_COMMIT_TAG;
      fi
  only:
    - /^release.*$/
    - tags
  dependencies:
    - scan
